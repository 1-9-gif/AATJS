<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - TechStore</title>

    <link rel="icon" href="img/laptop.jpg">

    <link rel="stylesheet" href="css/estilos.css">
    
</head>

<body>


    <header class="encabezado">

        <div class="contenedor-header">

            <h1>TechStore</h1>

            <button id="btnMenu" class="btn-menu">
                ☰
            </button>

            <nav id="menuNav">
                <ul>
                    <li>
                        <a href="index.html">Inicio</a>
                    </li>

                    <li>
                        <a href="carrito.html">Carrito</a>
                    </li>
                </ul>
            </nav>

        </div>

    </header>

    <main class="contenedor">

        <section class="catalogo">

            <h2>Mi Carrito de Compras</h2>

            <table>

                <thead>

                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio Unitario</th>
                        <th>Subtotal</th>
                        <th>Acción</th>
                    </tr>

                </thead>

                <tbody id="tablaCarrito">

                </tbody>

            </table>

            <div class="resumen">

                <h3>Resumen de Compra</h3>

                <p>
                    Subtotal:
                    <strong id="subtotal">
                        Q0.00
                    </strong>
                </p>

                <p>
                    IVA (12%):
                    <strong id="iva">
                        Q0.00
                    </strong>
                </p>

                <p>
                    Descuento:
                    <strong id="descuento">
                        Q0.00
                    </strong>
                </p>

                <p class="total">
                    Total:
                    <strong id="total">
                        Q0.00
                    </strong>
                </p>

 

                <div class="form-descuento">

                    <input
                        type="text"
                        id="codigoDescuento"
                        placeholder="Ingrese código de descuento">

                    <button
                        id="btnDescuento"
                        class="btn-principal">

                        Aplicar Código

                    </button>

                </div>

                <br>

                <button
                    onclick="confirmarCompra()"
                    class="btn-principal">

                    Confirmar Compra

                </button>

            </div>

        </section>

    </main>



    <footer>

        <div class="contenedor">

            <p>
                Proyecto Integrador AAT1
            </p>

            <p>
                HTML5 + CSS3 + JavaScript + jQuery
            </p>

            <p>
                © 2026 TechStore
            </p>

        </div>

    </footer>



    <script src="js/jquery.min.js"></script>



    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



    <script src="js/main.js"></script>

</body>

</html>
